# kitty things
set-environment -g KITTY_LISTEN_ON "$KITTY_LISTEN_ON"
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ',xterm-256color:OSC-52=Weird:enable'
set -as terminal-features ',xterm-kitty:allow-passthrough'
set-option -g allow-passthrough on

if-shell '[ -z "$WORK" ]' "unbind C-b; set -g prefix C-a; bind C-a send-prefix"

# setw -g mode-keys vim
set -g mouse on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g set-clipboard on

# don't rename windows automatically
set-option -g allow-rename off

# layout
set -g status-position top

set-window-option -g automatic-rename off

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind J swap-pane -D
bind K swap-pane -U

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.1.3'

# Catppuccin v2 configuration
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_text " #W#{?#{E:@claude_status}, #{E:@claude_status},}"
set -g @catppuccin_window_current_text " #W#{?#{E:@claude_status}, #{E:@claude_status},}"

# Clear Claude status marker when switching to the window
set-hook -g after-select-window 'set-option -uw @claude_status'
set -g @catppuccin_directory_text "#{pane_current_path}"
set -g @catppuccin_date_time_text "%Y-%m-%d %H:%M:%S"

# Load catppuccin (must come after options, before status-left/right)
run '~/.tmux/plugins/tmux/catppuccin.tmux'

# Blank second status line as visual spacer between header and content
set -g status 2
set -g status-format[1] ""

# Status line - use catppuccin modules
set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#{E:@catppuccin_status_user}#{E:@catppuccin_status_host}"
set -g status-right "#{E:@catppuccin_status_session}#{E:@catppuccin_status_directory}#{E:@catppuccin_status_date_time}"

# Initialize TPM (must be last)
run '~/.tmux/plugins/tpm/tpm'
